version: '3.8'

services:
  # QuantFlow backend (Order book intelligence)
  quantflow:
    image: quantflow:latest
    container_name: quantflow
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///app/data/quantflow.db
    volumes:
      - quantflow-db:/app/data
    depends_on:
      - redis
    networks:
      - signalflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NarrativeFlow backend (Narrative tracking)
  narrativeflow:
    image: narrativeflow:latest
    container_name: narrativeflow
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///app/data/narrativeflow.db
    volumes:
      - narrativeflow-db:/app/data
    depends_on:
      - redis
    networks:
      - signalflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SignalFlow backend (Signal fusion engine)
  signalflow-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalflow-backend
    ports:
      - "8002:8002"
    environment:
      - QUANTFLOW_URL=ws://quantflow:8000
      - NARRATIVEFLOW_URL=ws://narrativeflow:8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///app/data/signalflow.db
    volumes:
      - signalflow-db:/app/data
    depends_on:
      - quantflow
      - narrativeflow
      - redis
    networks:
      - signalflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SignalFlow frontend (Command Center UI)
  signalflow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signalflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://signalflow-backend:8002
      - NEXT_PUBLIC_WS_URL=ws://localhost:8002
    depends_on:
      - signalflow-backend
    networks:
      - signalflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: signalflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - signalflow-network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  signalflow-network:
    driver: bridge

volumes:
  redis-data:
  quantflow-db:
  narrativeflow-db:
  signalflow-db: